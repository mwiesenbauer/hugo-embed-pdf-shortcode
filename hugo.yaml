module:
  hugoVersion:
    extended: false
    min: "0.80.0"

  mounts:
    - source: assets
      target: assets/embed-pdf

    - source: layouts
      target: layouts

params:
  pdfjs:
    Src: "https://unpkg.com/pdfjs-dist@6.1.200/build/pdf.mjs"
    WorkerSrc: "https://unpkg.com/pdfjs-dist@6.1.200/build/pdf.worker.mjs"
